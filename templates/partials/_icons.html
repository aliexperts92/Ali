{# Inline SVG icon set. Pass an `icon` variable: flame | vista | leaf | glass #}
{% if icon == "flame" %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" width="100%" height="100%">
  <path d="M12 3c1 3-2 4-2 7a2 2 0 1 0 4 0c0-1-1-2-1-3 2 1 4 4 4 7a5 5 0 1 1-10 0c0-4 3-6 5-11z"/>
</svg>
{% elif icon == "vista" %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" width="100%" height="100%">
  <path d="M3 18l5-7 4 5 3-4 6 6"/><circle cx="17" cy="6" r="2"/><path d="M2 20h20"/>
</svg>
{% elif icon == "leaf" %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" width="100%" height="100%">
  <path d="M5 19c0-8 6-14 14-14 0 8-6 14-14 14z"/><path d="M5 19c3-5 6-7 10-9"/>
</svg>
{% elif icon == "glass" %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" width="100%" height="100%">
  <path d="M6 3h12l-1 6a5 5 0 0 1-10 0z"/><path d="M12 14v5"/><path d="M8 21h8"/>
</svg>
{% else %}
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true" width="100%" height="100%">
  <circle cx="12" cy="12" r="8"/><path d="M12 8v8M8 12h8"/>
</svg>
{% endif %}
